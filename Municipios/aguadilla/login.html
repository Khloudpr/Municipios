<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap');
  * { font-family: 'DM Sans', sans-serif; }
  body { background: linear-gradient(135deg, #0f1f3d 0%, #1e3a8a 60%, #1e40af 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { background: white; border-radius: 24px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 25px 60px rgba(0,0,0,0.3); }

  .input:focus { border-color: #1e40af; }
  .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #1e3a8a, #1e40af); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: inherit; }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(30,64,175,0.4); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
  .error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; padding: 12px 16px; border-radius: 10px; font-size: 14px; font-weight: 600; display: none; }
  .input-wrap { position: relative; }
  .eye-btn { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #94a3b8; font-size: 15px; padding: 4px; }
  .eye-btn:hover { color: #64748b; }

    <h1 class="text-2xl font-black text-slate-900">Acceso Empleados</h1>
    <p class="text-slate-500 text-sm mt-1">Sistema Municipal Aguadilla Reporta</p>
  </div>

  <!-- Error -->
  <div class="error mb-5" id="error-box">
    <i class="fas fa-exclamation-circle mr-2"></i>
    <span id="error-text">Error</span>
  </div>

  <!-- Form -->
  <div class="space-y-4">
    <div>
      <label class="block text-sm font-700 text-slate-700 mb-1.5">Correo electrónico</label>
      <input type="email" id="inp-email" class="input" placeholder="empleado@aguadilla.gov" autocomplete="email">
    </div>
    <div>
      <label class="block text-sm font-700 text-slate-700 mb-1.5">Contraseña</label>
      <div class="input-wrap">
        <input type="password" id="inp-password" class="input" placeholder="••••••••" autocomplete="current-password" style="padding-right:44px">
        <button class="eye-btn" type="button" onclick="togglePass()" id="eye-btn">
          <i class="fas fa-eye" id="eye-icon"></i>
        </button>
      </div>
    </div>
    <div class="pt-2">
      <button class="btn" id="btn-login" onclick="hacerLogin()">
        <i class="fas fa-sign-in-alt mr-2"></i> Iniciar Sesión
      </button>
    </div>
  </div>

  <div class="text-center mt-6">
    <a href="index.html" class="text-sm text-slate-400 hover:text-slate-600 transition">
      <i class="fas fa-arrow-left mr-1"></i> Volver al inicio
    </a>
  </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwf6zkn7u0PO3t9TPkVG2NjoDwRF7-BuSAtP4T0PXaDStulKQBJOXqzWFwm5Nqh6LP-jA/exec";

// Allow Enter key
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') hacerLogin();
});

function togglePass() {
  const inp = document.getElementById('inp-password');
  const icon = document.getElementById('eye-icon');
  if (inp.type === 'password') {
    inp.type = 'text';
    icon.className = 'fas fa-eye-slash';
  } else {
    inp.type = 'password';
    icon.className = 'fas fa-eye';
  }
}

function mostrarError(msg) {
  const box = document.getElementById('error-box');
  document.getElementById('error-text').textContent = msg;
  box.style.display = 'block';
}

function ocultarError() {
  document.getElementById('error-box').style.display = 'none';
}

async function hacerLogin() {
  const email = document.getElementById('inp-email').value.trim().toLowerCase();
  const password = document.getElementById('inp-password').value;
  const btn = document.getElementById('btn-login');

  ocultarError();

  if (!email) { mostrarError('Por favor ingresa tu email.'); return; }
  if (!password) { mostrarError('Por favor ingresa tu contraseña.'); return; }

  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Verificando...';

  try {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'login', email: email, password: password })
    });

    const data = await res.json();
    console.log('Login response:', data);

    if (data.result === 'success' && (data.rol === 'admin' || data.rol === 'empleado')) {
      // Save full session
      localStorage.setItem('user_session', JSON.stringify({
        email: data.email,
        nombre: data.nombre,
        apellido: data.apellido,
        rol: data.rol,
        departamento: data.departamento || '',
        permisos: data.permisos || '',
        loginTime: new Date().toISOString()
      }));

      btn.innerHTML = '<i class="fas fa-check mr-2"></i> ¡Acceso concedido!';
      btn.style.background = 'linear-gradient(135deg, #059669, #10b981)';

      setTimeout(() => { window.location.href = 'hub.html'; }, 800);

    } else {
      mostrarError(data.message || 'Credenciales incorrectas. Verifica e intenta de nuevo.');
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i> Iniciar Sesión';
    }

  } catch (err) {
    console.error('Error:', err);
    mostrarError('Error de conexión. Intenta de nuevo.');
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i> Iniciar Sesión';
  }
}
</script>
