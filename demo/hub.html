<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title"><span data-municipio-sistema>Demo Reporta</span></title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --color-primario: #1e3a8a;
      --color-primario-dark: #0f1f3d;
      --color-secundario: #1e40af;
      --color-acento: #3b82f6;
    }
  </style>
  <style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800;900&display=swap');
  * { font-family: 'DM Sans', sans-serif; }

  body {
    background: #f1f5f9;
    min-height: 100vh;
  }

  .header {
    background: linear-gradient(135deg, var(--color-primario-dark) 0%, var(--color-primario) 60%, var(--color-secundario) 100%);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .module-card {
    background: white;
    border-radius: 20px;
    padding: 28px;
    border: 1.5px solid #e2e8f0;
    cursor: pointer;
    transition: all 0.25s;
    text-decoration: none;
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: relative;
    overflow: hidden;
  }
  .module-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--card-color, #3b82f6);
  }
  .module-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 16px 40px rgba(0,0,0,0.1);
    border-color: var(--card-color, #3b82f6);
  }
  .module-card.locked {
    opacity: 0.4;
    cursor: not-allowed;
    pointer-events: none;
  }

  .module-icon {
    width: 52px;
    height: 52px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
  }

  .admin-section {
    background: linear-gradient(135deg, #fef3c7, #fffbeb);
    border: 1.5px solid #fde68a;
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 32px;
  }

  .greeting-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.15);
    padding: 6px 14px;
    border-radius: 99px;
    color: white;
    font-size: 13px;
    font-weight: 600;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fade-up { animation: fadeUp 0.4s ease forwards; }
  .fade-up:nth-child(1) { animation-delay: 0.05s; }
  .fade-up:nth-child(2) { animation-delay: 0.1s; }
  .fade-up:nth-child(3) { animation-delay: 0.15s; }
  .fade-up:nth-child(4) { animation-delay: 0.2s; }
  .fade-up:nth-child(5) { animation-delay: 0.25s; }
</style>
  <script src="config.js"></script>
<script>
// Aplicar configuración del municipio dinámicamente
(function() {
  function applyConfig() {
    const C = window.MUNICIPIO_CONFIG;
    if (!C) return;
    // CSS variables
    const root = document.documentElement;
    root.style.setProperty('--color-primario', C.color_primario);
    root.style.setProperty('--color-primario-dark', C.color_primario_dark);
    root.style.setProperty('--color-secundario', C.color_secundario);
    root.style.setProperty('--color-acento', C.color_acento);
    // Meta theme-color
    const meta = document.getElementById('theme-color-meta');
    if (meta) meta.content = C.color_primario;
    // Textos
    document.querySelectorAll('[data-municipio-sistema]').forEach(el => el.textContent = C.sistema);
    document.querySelectorAll('[data-municipio-nombre]').forEach(el => el.textContent = C.nombre);
    document.querySelectorAll('[data-municipio-descripcion]').forEach(el => el.textContent = C.descripcion);
    document.querySelectorAll('[data-municipio-footer]').forEach(el => el.textContent = C.footer_texto);
    document.querySelectorAll('[data-municipio-iniciales]').forEach(el => el.textContent = C.iniciales);
    // Email placeholder
    document.querySelectorAll('[data-municipio-email]').forEach(el => {
      el.placeholder = 'empleado@' + C.email_dominio;
    });
    // Logo
    document.querySelectorAll('[data-municipio-logo]').forEach(el => {
      if (C.logo_url) { el.src = C.logo_url; el.style.display = ''; }
      else { el.style.display = 'none'; }
    });
    // Título página
    document.title = C.sistema;
  }
  // Ejecutar inmediatamente y también cuando el DOM esté listo
  applyConfig();
  document.addEventListener('DOMContentLoaded', applyConfig);
})();
</script>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="flex items-center gap-4">
    <img data-municipio-logo src="" alt="Logo" class="h-11 w-auto" style="display:none">
    <div>
      <div class="text-white font-black text-lg leading-tight"><span data-municipio-sistema>Demo Reporta</span></div>
      <div class="text-white/50 text-xs">Portal de Empleados</div>
    </div>
  </div>
  <div class="flex items-center gap-4">
    <div class="greeting-chip">
      <div class="w-7 h-7 rounded-full bg-white/20 flex items-center justify-center font-black text-sm" id="header-avatar">--</div>
      <span id="header-name">Cargando...</span>
    </div>
    <a href="login.html" onclick="cerrarSesion()" class="text-white/50 hover:text-white text-sm transition flex items-center gap-2">
      <i class="fas fa-sign-out-alt"></i>
      <span class="hidden sm:inline">Salir</span>
    </a>
  </div>
</div>

<!-- MAIN -->
<div class="max-w-5xl mx-auto px-6 py-10" id="main-content">

  <!-- Admin banner -->
  <div id="admin-banner" class="admin-section hidden mb-8">
    <div class="flex items-center gap-3 mb-3">
      <div class="w-8 h-8 bg-amber-400 rounded-xl flex items-center justify-center">
        <i class="fas fa-crown text-white text-sm"></i>
      </div>
      <div>
        <div class="font-black text-amber-900">Modo Administrador</div>
        <div class="text-amber-700 text-xs">Tienes acceso completo al sistema</div>
      </div>
    </div>
    <a href="empleados.html" class="inline-flex items-center gap-2 bg-amber-500 hover:bg-amber-600 text-white px-5 py-2.5 rounded-xl font-bold text-sm transition">
      <i class="fas fa-users"></i> Gestionar Empleados
    </a>
  </div>

  <!-- Welcome -->
  <div class="mb-8">
    <h1 class="text-2xl font-black text-slate-900 mb-1">Bienvenido, <span id="welcome-name">—</span> 👋</h1>
    <p class="text-slate-500 text-sm" id="welcome-subtitle">Selecciona un módulo para comenzar</p>
  </div>

  <!-- Modules grid -->
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5" id="modules-grid">
    <!-- Rendered by JS -->
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://fuqewniyquxqdnivcuvc.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZxd3N0d2tidXNqcnpjem5ud2l2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5OTI1OTgsImV4cCI6MjA5MDU2ODU5OH0.qeFlDHW7T8-xd3crCDnP2a57qu52TrfVaWQ7DSMJMwo";
let sb;
const MODULES = [
  {
    id: 'dashboard',
    title: 'Dashboard',
    desc: 'Estadísticas, KPIs y resumen ejecutivo',
    icon: 'fa-chart-line',
    color: '#3b82f6',
    bg: '#eff6ff',
    url: 'dashboard1.html'
  },
  {
    id: 'reportes',
    title: 'Reportes',
    desc: 'Gestión y seguimiento de incidencias',
    icon: 'fa-file-alt',
    color: '#8b5cf6',
    bg: '#f5f3ff',
    url: 'reportes1.html'
  },
  {
    id: 'mapa',
    title: 'Mapa GIS',
    desc: 'Visualización geográfica de reportes',
    icon: 'fa-map-marked-alt',
    color: '#10b981',
    bg: '#ecfdf5',
    url: 'mapa1.html'
  },
  {
    id: 'empleados',
    title: 'Empleados',
    desc: 'Gestión de usuarios y permisos',
    icon: 'fa-users',
    color: '#f59e0b',
    bg: '#fffbeb',
    url: 'empleados.html'
  }
];

// Auth check async
let session = {};

function renderModules(session) {
  let accessibleModules;
  if (session.rol === 'admin') {
    accessibleModules = new Set(['dashboard', 'reportes', 'mapa', 'empleados']);
  } else {
    const perms = (session.permisos || '').split(',').map(p => p.trim()).filter(Boolean);
    accessibleModules = new Set(perms);
  }
  const grid = document.getElementById('modules-grid');
  const visibleModules = MODULES.filter(mod => {
    if (session.rol === 'admin') return true;
    if (mod.id === 'empleados') return false;
    return accessibleModules.has(mod.id);
  });
  grid.innerHTML = visibleModules.map((mod, i) => {
    return `
      <a href="${mod.url}"
         class="module-card fade-up"
         style="--card-color:${mod.color};opacity:0">
        <div class="flex items-center justify-between">
          <div class="module-icon" style="background:${mod.bg}">
            <i class="fas ${mod.icon}" style="color:${mod.color}"></i>
          </div>
          <i class="fas fa-arrow-right text-slate-300 text-sm"></i>
        </div>
        <div>
          <div class="font-black text-slate-900 text-lg">${mod.title}</div>
          <div class="text-sm text-slate-500 mt-1">${mod.desc}</div>
        </div>
      </a>`;
  }).join('');
}

async function inicializar() {
  try {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const { data: { session: authSession } } = await sb.auth.getSession();
    if (!authSession) { window.location.href = 'login.html'; return; }
    const { data: perfil, error } = await sb.from('perfiles').select('*').eq('id', authSession.user.id).single();
    if (error || !perfil || !perfil.activo) { await sb.auth.signOut(); window.location.href = 'login.html'; return; }
    session = { ...perfil, email: authSession.user.email };
    localStorage.setItem('user_session', JSON.stringify(session));
    // Set header
    document.getElementById('header-name').textContent = perfil.nombre || 'Empleado';
    document.getElementById('header-avatar').textContent = ((perfil.nombre||'E')[0] + (perfil.apellido||'')[0]).toUpperCase();
    document.getElementById('welcome-name').textContent = perfil.nombre || 'Empleado';
    // Show admin banner
    if (perfil.rol === 'admin') {
      document.getElementById('admin-banner').classList.remove('hidden');
      document.getElementById('welcome-subtitle').textContent = 'Tienes acceso completo al sistema. Selecciona un módulo.';
    }
    renderModules(session);
  } catch(e) { window.location.href = 'login.html'; }
}

async function cerrarSesion() {
  await sb.auth.signOut();
  localStorage.removeItem('user_session');
}

inicializar();
</script>
</body>
</html>
