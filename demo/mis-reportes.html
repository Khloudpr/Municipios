<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta id="theme-color-meta" name="theme-color" content="#1e3a8a">
<title id="page-title">Mis Reportes</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="config.js"></script>
<script>
// Aplicar configuración del municipio dinámicamente
(function() {
  function applyConfig() {
    const C = window.MUNICIPIO_CONFIG;
    if (!C) return;
    // CSS variables
    const root = document.documentElement;
    root.style.setProperty('--color-primario', C.color_primario);
    root.style.setProperty('--color-primario-dark', C.color_primario_dark);
    root.style.setProperty('--color-secundario', C.color_secundario);
    root.style.setProperty('--color-acento', C.color_acento);
    // Meta theme-color
    const meta = document.getElementById('theme-color-meta');
    if (meta) meta.content = C.color_primario;
    // Textos
    document.querySelectorAll('[data-municipio-sistema]').forEach(el => el.textContent = C.sistema);
    document.querySelectorAll('[data-municipio-nombre]').forEach(el => el.textContent = C.nombre);
    document.querySelectorAll('[data-municipio-descripcion]').forEach(el => el.textContent = C.descripcion);
    document.querySelectorAll('[data-municipio-footer]').forEach(el => el.textContent = C.footer_texto);
    document.querySelectorAll('[data-municipio-iniciales]').forEach(el => el.textContent = C.iniciales);
    // Email placeholder
    document.querySelectorAll('[data-municipio-email]').forEach(el => {
      el.placeholder = 'empleado@' + C.email_dominio;
    });
    // Logo
    document.querySelectorAll('[data-municipio-logo]').forEach(el => {
      if (C.logo_url) { el.src = C.logo_url; el.style.display = ''; }
      else { el.style.display = 'none'; }
    });
    // Título página
    document.title = 'Mis Reportes | ' + C.sistema;
    // Link nuevo reporte
    const linkNuevoReporte = document.getElementById('link-nuevo-reporte');
    if (linkNuevoReporte && C.url_nuevo_reporte) {
      linkNuevoReporte.href = C.url_nuevo_reporte;
    }
  }
  applyConfig();
  document.addEventListener('DOMContentLoaded', applyConfig);
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --color-primario: #1e3a8a;
    --color-primario-dark: #0f1f3d;
    --color-secundario: #1e40af;
    --color-acento: #3b82f6;
  }
</style>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap');
* { font-family: 'DM Sans', sans-serif; }
.gradient-bg { background: linear-gradient(135deg, var(--color-primario-dark) 0%, var(--color-primario) 60%, var(--color-secundario) 100%); min-height: 100vh; }
.card { background: white; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
.input { width:100%; padding:12px 16px; border:2px solid #e2e8f0; border-radius:12px; font-size:15px; outline:none; transition:border-color 0.2s; }
.input:focus { border-color:#1e40af; }
.btn-primary { background: linear-gradient(135deg, var(--color-primario) 0%, var(--color-secundario) 100%); color:white; padding:13px 28px; border-radius:12px; font-weight:700; font-size:15px; border:none; cursor:pointer; width:100%; transition:all 0.2s; display:flex; align-items:center; justify-content:center; gap:8px; }
.btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(30,64,175,0.35); }
.btn-primary:disabled { opacity:0.6; cursor:not-allowed; transform:none; box-shadow:none; }
.badge { display:inline-flex; align-items:center; gap:5px; padding:4px 12px; border-radius:99px; font-weight:700; font-size:12px; }
.badge-nuevo { background:#dbeafe; color:#1e40af; }
.badge-pendiente { background:#fef3c7; color:#92400e; }
.badge-revision { background:#ede9fe; color:#5b21b6; }
.badge-completo { background:#d1fae5; color:#065f46; }
.report-card { background:white; border-radius:16px; border:1.5px solid #e2e8f0; padding:18px 20px; transition:all 0.2s; cursor:pointer; }
.report-card:hover { border-color:#93c5fd; box-shadow:0 4px 16px rgba(30,64,175,0.1); transform:translateY(-2px); }
.progress-track { background:#e2e8f0; border-radius:99px; height:5px; overflow:hidden; }
.progress-fill { height:100%; border-radius:99px; transition:width 0.8s ease; }
.stat-pill { display:flex; flex-direction:column; align-items:center; padding:14px 20px; border-right:1px solid #e2e8f0; flex:1; }
.stat-pill:last-child { border-right:none; }
@keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
.fade-up { animation: fadeUp 0.4s ease forwards; }
</style>
</head>
<body class="gradient-bg">
<div class="min-h-screen flex flex-col items-center justify-center p-4 py-12">

  <div class="text-center mb-8">
    <a href="index.html" class="inline-flex items-center gap-3 mb-6">
      <img data-municipio-logo src="" alt="Escudo Municipal" class="h-12 w-auto drop-shadow-lg" style="display:none">
      <span class="text-white font-bold text-lg"><span data-municipio-sistema>Mi Municipio Reporta</span></span>
    </a>
    <h1 class="text-3xl md:text-4xl font-black text-white mb-2">Mis Reportes</h1>
    <p class="text-white/70">Consulta todos tus reportes anteriores</p>
  </div>

  <div class="card w-full max-w-md p-8 mb-6" id="search-card">
    <div class="text-center mb-6">
      <div class="w-14 h-14 bg-blue-50 rounded-2xl flex items-center justify-center mx-auto mb-3">
        <i class="fas fa-envelope text-blue-600 text-xl"></i>
      </div>
      <p class="text-slate-500 text-sm">Ingresa el email que usaste al reportar</p>
    </div>
    <div class="mb-4">
      <input type="email" id="email-input" class="input" placeholder="tu@email.com" onkeydown="if(event.key==='Enter') buscarPorEmail()">
    </div>
    <button class="btn-primary" id="btn-buscar" onclick="buscarPorEmail()">
      <i class="fas fa-search"></i> Ver mis reportes
    </button>
    <div id="error-msg" class="mt-4 text-center text-red-500 text-sm font-semibold hidden"></div>
  </div>

  <div id="results-section" class="w-full max-w-2xl hidden fade-up">
    <div class="card mb-5">
      <div class="flex">
        <div class="stat-pill"><span class="text-2xl font-black text-slate-900" id="stat-total">0</span><span class="text-xs text-slate-500 mt-1">Total</span></div>
        <div class="stat-pill"><span class="text-2xl font-black text-amber-500" id="stat-abiertos">0</span><span class="text-xs text-slate-500 mt-1">Abiertos</span></div>
        <div class="stat-pill"><span class="text-2xl font-black text-green-500" id="stat-resueltos">0</span><span class="text-xs text-slate-500 mt-1">Resueltos</span></div>
      </div>
    </div>
    <div id="reports-list" class="space-y-3 mb-5"></div>
    <div class="card p-6 text-center">
      <p class="text-slate-500 text-sm mb-4">¿Tienes otro problema que reportar?</p>
      <a id="link-nuevo-reporte" href="aguadilla-reporta-completo.html" class="inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-bold text-sm transition">
        <i class="fas fa-plus"></i> Nuevo Reporte
      </a>
    </div>
  </div>

  <a href="index.html" class="mt-6 text-white/50 hover:text-white text-sm transition">
    <i class="fas fa-arrow-left mr-1"></i> Volver al inicio
  </a>
</div>

<script>
const SUPABASE_URL = "https://fuqewniyquxqdnivcuvc.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1cWV3bml5cXV4cWRuaXZjdXZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzM1NDcsImV4cCI6MjA5Mzc0OTU0N30.4L3KUI03jbaBqNz5zjZSCySE_dT8xlEQc-6lB4aubfU";
let sb;

// Inicializar Supabase y luego verificar URL params
document.addEventListener('DOMContentLoaded', () => {
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Verificar si viene email por URL — DESPUÉS de que sb esté listo
  const urlEmail = new URLSearchParams(window.location.search).get('email');
  if (urlEmail) {
    const input = document.getElementById('email-input');
    if (input) input.value = urlEmail;
    buscarPorEmail();
  }
});

async function buscarPorEmail() {
  const email = document.getElementById('email-input').value.trim().toLowerCase();
  const errorEl = document.getElementById('error-msg');
  errorEl.classList.add('hidden');
  if (!email || !email.includes('@')) {
    errorEl.textContent = 'Por favor ingresa un email valido.';
    errorEl.classList.remove('hidden');
    return;
  }
  if (!sb) {
    errorEl.textContent = 'Cargando... intenta en un momento.';
    errorEl.classList.remove('hidden');
    return;
  }
  const btn = document.getElementById('btn-buscar');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Buscando...';
  try {
    const { data, error } = await sb.from('reportes').select('*').eq('email', email).order('fecha_creacion', { ascending: false });
    if (error) throw error;
    if (data && data.length > 0) {
      mostrarResultados(data);
    } else {
      errorEl.textContent = 'No encontramos reportes asociados a ese email.';
      errorEl.classList.remove('hidden');
      document.getElementById('results-section').classList.add('hidden');
    }
  } catch(e) {
    errorEl.textContent = 'Error de conexion. Intenta nuevamente.';
    errorEl.classList.remove('hidden');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-search"></i> Ver mis reportes';
  }
}

function mostrarResultados(reportes) {
  const total = reportes.length;
  const resueltos = reportes.filter(r => r.estatus === 'resuelto').length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-abiertos').textContent = total - resueltos;
  document.getElementById('stat-resueltos').textContent = resueltos;
  reportes.sort((a,b) => new Date(b.fecha_creacion) - new Date(a.fecha_creacion));
  const badgeMap = {'nuevo':'badge-nuevo','pendiente':'badge-pendiente','en_progreso':'badge-revision','resuelto':'badge-completo'};
  const iconMap  = {'nuevo':'fa-circle-dot','pendiente':'fa-clock','en_progreso':'fa-magnifying-glass','resuelto':'fa-circle-check'};
  const progressMap = {'nuevo':'10%','pendiente':'40%','en_progreso':'70%','resuelto':'100%'};
  const colorMap    = {'nuevo':'#3b82f6','pendiente':'#f59e0b','en_progreso':'#8b5cf6','resuelto':'#10b981'};
  const estatusLabel = {'nuevo':'Nuevo','pendiente':'Pendiente','en_progreso':'En Revisión','resuelto':'Completado'};
  const catIcons = {'Basura':'fa-trash','Arboles':'fa-tree','Árboles':'fa-tree','Alumbrado':'fa-lightbulb','Baches':'fa-road','Agua':'fa-tint','Animales':'fa-paw','Vandalismo':'fa-exclamation-triangle'};
  const list = document.getElementById('reports-list');
  list.innerHTML = reportes.map(r => {
    const estatus = r.estatus || 'nuevo';
    const label = estatusLabel[estatus] || estatus;
    const fecha = r.fecha_creacion ? new Date(r.fecha_creacion).toLocaleDateString('es-PR', {year:'numeric',month:'short',day:'numeric'}) : '—';
    const catIcon = Object.entries(catIcons).find(([k]) => (r.categoria||'').includes(k))?.[1] || 'fa-file-alt';
    return `<div class="report-card" onclick="window.location.href='consulta.html?codigo=${r.id}'">
      <div class="flex items-start justify-between gap-3 mb-3">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-blue-50 flex items-center justify-center flex-shrink-0">
            <i class="fas ${catIcon} text-blue-600 text-sm"></i>
          </div>
          <div>
            <div class="font-black text-slate-900 text-sm tracking-wide">${r.id}</div>
            <div class="text-xs text-slate-500">${r.categoria || 'Sin categoria'}</div>
          </div>
        </div>
        <span class="badge ${badgeMap[estatus] || 'badge-nuevo'}">
          <i class="fas ${iconMap[estatus] || 'fa-circle'} text-xs"></i> ${label}
        </span>
      </div>
      <div class="text-sm text-slate-600 mb-3">${r.ubicacion || 'Sin ubicacion'}</div>
      <div class="progress-track mb-2">
        <div class="progress-fill" style="width:${progressMap[estatus]||'10%'};background:${colorMap[estatus]||'#3b82f6'}"></div>
      </div>
      <div class="flex items-center justify-between">
        <span class="text-xs text-slate-400">${fecha}</span>
        <span class="text-xs text-blue-600 font-semibold">Ver detalle <i class="fas fa-arrow-right ml-1 text-xs"></i></span>
      </div>
    </div>`;
  }).join('');
  document.getElementById('results-section').classList.remove('hidden');
  document.getElementById('results-section').scrollIntoView({behavior:'smooth',block:'start'});
}
</script>
</body>
</html>
